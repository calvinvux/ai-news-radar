name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'  # Mỗi ngày lúc 0h00 UTC
  workflow_dispatch: # Chạy thuống tay

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote add upstream https://github.com/LearnPrompt/ai-news-radar.git || true
          git fetch upstream
          git merge upstream/main --allow-unrelated-histories --no-edit || true
          git push
